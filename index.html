<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>드래곤 속성 계산기</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171b2e;
      --panel2: #202640;
      --text: #f3f5ff;
      --muted: #aeb6d8;
      --line: #303858;
      --accent: #8ea7ff;
      --good: #4ade80;
      --normal: #cbd5e1;
      --bad: #fbbf24;
      --verybad: #fb7185;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #1d2442, var(--bg) 46%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      padding-bottom: 24px;
    }

    header {
      padding: 22px 14px 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15,18,32,.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.4px;
    }

    p {
      color: var(--muted);
      margin: 6px 0;
      line-height: 1.45;
    }

    main {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 12px;
    }

    .tabs {
      position: sticky;
      top: 68px;
      z-index: 9;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px 12px;
      background: rgba(15,18,32,.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      max-width: 1180px;
      margin: 0 auto;
    }

    button, select, input {
      font: inherit;
    }

    .tab-btn, .mode-btn, .primary-btn {
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      padding: 11px 8px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
    }

    .tab-btn.active, .mode-btn.active, .primary-btn {
      background: var(--accent);
      color: #0b1020;
      border-color: var(--accent);
    }

    .card {
      background: rgba(23,27,46,.94);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      margin: 12px 0;
      box-shadow: 0 14px 34px rgba(0,0,0,.24);
    }

    h2 {
      font-size: 18px;
      margin: 0 0 10px;
    }

    h3 {
      font-size: 16px;
      margin: 0 0 8px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    select {
      width: 100%;
      background: #11162a;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 13px 12px;
      min-height: 46px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 0;
    }

    .fortress-mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 0;
    }

    .stage {
      background: rgba(32,38,64,.65);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      margin: 10px 0;
    }

    .stage-teams {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .team-box {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      margin-top: 10px;
    }

    .result-main {
      border: 2px solid var(--accent);
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(135deg, rgba(142,167,255,.18), rgba(23,27,46,.96));
      margin-top: 12px;
    }

    .result-two {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .score {
      font-size: 24px;
      font-weight: 900;
      color: var(--accent);
      margin: 4px 0 10px;
    }

    .lineup {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 10px 0;
    }

    .slot {
      background: #10162a;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    .slot strong {
      display: block;
      font-size: 19px;
      margin-top: 3px;
    }

    .rank-item {
      background: #11162a;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      margin: 8px 0;
    }

    .rank-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }

    .mini {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .warning {
      border-left: 4px solid var(--bad);
      padding: 10px 12px;
      background: rgba(251,191,36,.08);
      border-radius: 10px;
      color: var(--muted);
      margin: 10px 0;
      font-size: 13px;
      line-height: 1.45;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 6px 0 10px;
    }

    .pill {
      border: 1px solid var(--line);
      background: #10162a;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 13px;
    }

    .great { color: var(--good); font-weight: 900; }
    .normal { color: var(--normal); }
    .bad { color: var(--bad); font-weight: 800; }
    .verybad { color: var(--verybad); font-weight: 900; }

    details {
      border: 1px solid var(--line);
      background: rgba(17,22,42,.82);
      border-radius: 14px;
      padding: 10px 12px;
      margin: 8px 0;
    }

    summary {
      cursor: pointer;
      font-weight: 900;
      font-size: 16px;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .quick-result {
      text-align: center;
      padding: 16px;
      border-radius: 18px;
      background: #10162a;
      border: 1px solid var(--line);
      margin-top: 10px;
    }

    .quick-result strong {
      display: block;
      font-size: 26px;
      margin-top: 4px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      margin: 10px 0;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
    }


    .version-switch {
      margin: 28px 0 10px;
      padding: 14px;
      background: rgba(23,27,46,.94);
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .version-switch-title {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      margin-bottom: 10px;
    }

    .version-switch-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .version-btn {
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      padding: 13px 8px;
      border-radius: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .version-btn.active {
      background: var(--accent);
      color: #0b1020;
      border-color: var(--accent);
    }

    body.force-mobile main {
      width: min(100%, 560px);
    }

    body.force-mobile .grid3,
    body.force-mobile .stage-teams,
    body.force-mobile .result-two,
    body.force-mobile .lineup,
    body.force-mobile .chart-grid {
      grid-template-columns: 1fr !important;
    }

    body.force-mobile .fortress-mode-tabs {
      grid-template-columns: 1fr !important;
    }

    body.force-mobile h1 {
      font-size: 20px;
    }

    body.force-pc main {
      width: min(100%, 1180px);
    }

    body.force-pc .grid3,
    body.force-pc .lineup {
      grid-template-columns: repeat(3, 1fr) !important;
    }

    body.force-pc .stage-teams,
    body.force-pc .result-two,
    body.force-pc .chart-grid,
    body.force-pc .fortress-mode-tabs {
      grid-template-columns: repeat(2, 1fr) !important;
    }


    @media (max-width: 720px) {
      body { padding-bottom: 20px; }

      header { padding: 18px 14px 10px; }

      h1 { font-size: 20px; }

      main {
        width: min(100%, 560px);
        padding: 12px;
      }

      .tabs {
        top: 58px;
        width: 100%;
        grid-template-columns: repeat(3, 1fr);
      }

      .grid3,
      .stage-teams,
      .result-two,
      .lineup,
      .chart-grid {
        grid-template-columns: 1fr;
      }

      .fortress-mode-tabs {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>드래곤 속성 계산기</h1>
    <p>상성표 · 최적 배치 · 지하성채</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="quick">빠른계산</button>
    <button class="tab-btn" data-tab="optimizer">최적배치</button>
    <button class="tab-btn" data-tab="chart">상성표</button>
  </div>

  <main>
    <section id="quick" class="card">
      <h2>빠른 상성 계산</h2>
      <div class="grid3">
        <label>내 공격 속성
          <select id="quickAttack"></select>
        </label>
        <label>상대 방어 속성
          <select id="quickDefense"></select>
        </label>
      </div>
      <div id="quickResult" class="quick-result"></div>
    </section>

    <section id="optimizer" class="card" style="display:none;">
      <h2>최적 배치</h2>

      <div class="mode-tabs">
        <button class="mode-btn active" data-mode="normal">일반</button>
        <button class="mode-btn" data-mode="fortress">지하성채</button>
      </div>

      <div id="normalMode">
        <p>상대 1~3번 속성을 선택하면 내 1~3번 최적 배치를 추천합니다.</p>
        <div class="grid3">
          <label>상대 1번
            <select id="enemy1"></select>
          </label>
          <label>상대 2번
            <select id="enemy2"></select>
          </label>
          <label>상대 3번
            <select id="enemy3"></select>
          </label>
        </div>
      </div>

      <div id="fortressMode" style="display:none;">
        <p>1팀은 상대 1팀, 2팀은 상대 2팀을 상대합니다.</p>
        <div class="warning">
          HP가 이어지므로 방어 효율을 크게 반영합니다. 1팀만 있으면 8턴, 1·2팀 모두 있으면 16턴 목표입니다.
        </div>

        <div class="fortress-mode-tabs">
          <button class="mode-btn active" data-team-mode="one">1팀만 있음 · 8턴</button>
          <button class="mode-btn" data-team-mode="two">1·2팀 모두 있음 · 16턴</button>
        </div>

        <div id="fortressInputs"></div>
      </div>

      <label class="checkbox-label">
        <input type="checkbox" id="allowDuplicate">
        같은 속성 중복 허용
      </label>

      <div id="bestResult"></div>
      <div id="rankList"></div>
    </section>

    <section id="chart" class="card" style="display:none;">
      <h2>상성표</h2>
      <p>속성을 눌러 공격 기준 상성을 확인하세요.</p>
      <div id="chartCards" class="chart-grid"></div>
    </section>

    <div class="version-switch">
      <div class="version-switch-title">보기 방식 선택</div>
      <div class="version-switch-grid">
        <button class="version-btn" id="pcVersionBtn" type="button">PC 버전</button>
        <button class="version-btn" id="mobileVersionBtn" type="button">모바일 버전</button>
      </div>
    </div>

  </main>

  <script>
    const TYPES = ["불","물","바람","강철","땅","번개","빛","어둠","꿈","영혼","여명","황혼","신성","혼돈"];

    const ATTACK = {
      "불": {great:["바람","강철","혼돈"], normal:["땅","번개","빛","어둠","꿈","영혼","여명","황혼"], bad:["불","물","신성"], verybad:[]},
      "물": {great:["불","땅"], normal:["강철","번개","빛","어둠","꿈","영혼","여명","황혼","혼돈"], bad:["물","바람","신성"], verybad:[]},
      "바람": {great:["물","땅"], normal:["번개","빛","어둠","꿈","여명","황혼","혼돈"], bad:["불","바람","강철","영혼","신성"], verybad:[]},
      "강철": {great:["여명","혼돈"], normal:["바람","땅","빛","어둠","꿈","영혼","황혼","신성"], bad:["불","물","강철","번개"], verybad:[]},
      "땅": {great:["불","강철","번개","영혼"], normal:["물","땅","빛","어둠","꿈","여명","황혼","신성","혼돈"], bad:["바람"], verybad:[]},
      "번개": {great:["물"], normal:["불","강철","빛","어둠","꿈","영혼","여명","황혼","혼돈"], bad:["바람","번개","신성"], verybad:["땅"]},
      "빛": {great:["강철","어둠","혼돈"], normal:["불","물","바람","땅","번개","빛","신성"], bad:["꿈","영혼","여명"], verybad:["황혼"]},
      "어둠": {great:["꿈","황혼"], normal:["불","물","바람","강철","땅","번개","영혼","신성","혼돈"], bad:["빛","어둠","여명"], verybad:[]},
      "꿈": {great:["빛","영혼"], normal:["불","물","바람","땅","번개","여명","황혼","신성","혼돈"], bad:["강철","꿈"], verybad:["어둠"]},
      "영혼": {great:["바람","여명"], normal:["불","물","번개","빛","어둠","꿈","신성","혼돈"], bad:["땅","영혼","황혼"], verybad:["강철"]},
      "여명": {great:["빛","어둠","신성"], normal:["물","바람","땅","번개","꿈","여명","황혼","혼돈"], bad:["불","강철","영혼"], verybad:[]},
      "황혼": {great:["꿈","황혼"], normal:["불","물","바람","강철","땅","번개","빛","영혼","여명","신성","혼돈"], bad:["어둠"], verybad:[]},
      "신성": {great:["신성"], normal:["불","물","바람","땅","번개","빛","어둠","꿈","영혼","황혼","혼돈"], bad:["강철"], verybad:["여명"]},
      "혼돈": {great:["바람","땅","신성"], normal:["번개","빛","어둠","꿈","영혼","여명","황혼"], bad:["불","물","강철","혼돈"], verybad:[]}
    };

    const TEXT = {great:"효과가 굉장함", normal:"효과가 보통임", bad:"효과가 별로임", verybad:"효과가 매우 별로임"};
    const SHORT = {great:"굉장함", normal:"보통", bad:"별로", verybad:"매우 별로"};
    const CLS = {great:"great", normal:"normal", bad:"bad", verybad:"verybad"};

    const OFFENSE_NORMAL = {great:3, normal:2, bad:1, verybad:0};
    const DEFENSE_NORMAL = {great:0, normal:1, bad:2, verybad:3};
    const OFFENSE_FORTRESS = {great:3.4, normal:2.0, bad:0.8, verybad:-0.6};
    const DEFENSE_FORTRESS = {great:-1.5, normal:1.2, bad:3.0, verybad:4.8};

    let battleMode = "normal";
    let fortressTeamMode = "one";

    function effectiveness(attacker, defender) {
      for (const key of ["great","normal","bad","verybad"]) {
        if (ATTACK[attacker][key].includes(defender)) return key;
      }
      return "normal";
    }

    function populateSelect(select, selectedIndex = 0) {
      select.innerHTML = "";
      TYPES.forEach(type => {
        const option = document.createElement("option");
        option.value = type;
        option.textContent = type;
        select.appendChild(option);
      });
      select.selectedIndex = selectedIndex;
    }

    function setTab(tab) {
      ["quick","optimizer","chart"].forEach(id => {
        document.getElementById(id).style.display = id === tab ? "" : "none";
      });
      document.querySelectorAll("[data-tab]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      window.scrollTo({top: 0, behavior: "smooth"});
    }

    function updateQuick() {
      const a = document.getElementById("quickAttack").value;
      const d = document.getElementById("quickDefense").value;
      const eff = effectiveness(a, d);
      document.getElementById("quickResult").innerHTML = `
        <span class="mini">${a} → ${d}</span>
        <strong class="${CLS[eff]}">${SHORT[eff]}</strong>
        <p>${TEXT[eff]}</p>
      `;
    }

    function allLineups(allowDuplicate) {
      const result = [];
      for (const a of TYPES) for (const b of TYPES) for (const c of TYPES) {
        if (!allowDuplicate && new Set([a,b,c]).size < 3) continue;
        result.push([a,b,c]);
      }
      return result;
    }

    function matchupScore(our, enemy, mode) {
      const attackEff = effectiveness(our, enemy);
      const incomingEff = effectiveness(enemy, our);
      const offense = mode === "fortress" ? OFFENSE_FORTRESS : OFFENSE_NORMAL;
      const defense = mode === "fortress" ? DEFENSE_FORTRESS : DEFENSE_NORMAL;
      return {
        score: offense[attackEff] + defense[incomingEff],
        attackEff,
        incomingEff
      };
    }

    function rankLineups(enemyStages, mode, allowDuplicate) {
      return allLineups(allowDuplicate).map(lineup => {
        const details = [[], [], []];
        let total = 0;
        let minSlotTotal = Infinity;
        let greatCount = 0;
        let dangerCount = 0;

        for (let slot = 0; slot < 3; slot++) {
          let slotTotal = 0;
          for (let stage = 0; stage < enemyStages.length; stage++) {
            const enemy = enemyStages[stage][slot];
            const d = matchupScore(lineup[slot], enemy, mode);
            details[slot].push({stage: stage + 1, enemy, ...d});
            total += d.score;
            slotTotal += d.score;
            if (d.attackEff === "great") greatCount++;
            if (d.incomingEff === "great") dangerCount++;
          }
          minSlotTotal = Math.min(minSlotTotal, slotTotal);
        }

        return {lineup, details, total, minSlotTotal, greatCount, dangerCount};
      }).sort((a,b) =>
        b.total - a.total ||
        b.minSlotTotal - a.minSlotTotal ||
        b.greatCount - a.greatCount ||
        a.dangerCount - b.dangerCount
      ).slice(0, 30);
    }

    function getNormalEnemies() {
      return [[
        document.getElementById("enemy1").value,
        document.getElementById("enemy2").value,
        document.getElementById("enemy3").value
      ]];
    }

    function getFortressTeam(team) {
      const result = [];
      for (let s = 1; s <= 3; s++) {
        result.push([
          document.getElementById(`f_s${s}_t${team}_e1`).value,
          document.getElementById(`f_s${s}_t${team}_e2`).value,
          document.getElementById(`f_s${s}_t${team}_e3`).value
        ]);
      }
      return result;
    }

    function enemyLabel(enemyStages, slot, mode) {
      return enemyStages.map((stage, idx) => mode === "fortress" ? `S${idx+1}:${stage[slot]}` : stage[slot]).join(" / ");
    }

    function detailLines(item, mode) {
      return item.lineup.map((our, slot) => {
        const lines = item.details[slot].map(d => {
          const stage = mode === "fortress" ? `S${d.stage} ` : "";
          return `${stage}${d.enemy}: 공격 ${SHORT[d.attackEff]}, 받는 피해 ${SHORT[d.incomingEff]}`;
        }).join(" / ");
        return `<div>${slot+1}번 ${our} → ${lines}</div>`;
      }).join("");
    }

    function bestBlock(title, item, enemyStages, mode) {
      return `
        <div class="result-main">
          <h3>${title}</h3>
          <div class="score">${item.total.toFixed(1)}점</div>
          <div class="lineup">
            ${item.lineup.map((t,i) => `
              <div class="slot">
                ${i+1}번 속성
                <strong>${t}</strong>
                <div class="mini">상대: ${enemyLabel(enemyStages, i, mode)}</div>
              </div>
            `).join("")}
          </div>
          <div class="mini">${detailLines(item, mode)}</div>
        </div>
      `;
    }

    function rankList(ranked, mode) {
      return ranked.map((item, idx) => `
        <div class="rank-item">
          <div class="rank-head">
            <strong>${idx+1}위</strong>
            <strong>${item.total.toFixed(1)}점</strong>
          </div>
          <div>${item.lineup.join(" / ")}</div>
          <div class="mini">${detailLines(item, mode)}</div>
        </div>
      `).join("");
    }

    function calculate() {
      const allowDuplicate = document.getElementById("allowDuplicate").checked;
      const bestResult = document.getElementById("bestResult");
      const rankArea = document.getElementById("rankList");

      if (battleMode === "normal") {
        const enemies = getNormalEnemies();
        const ranked = rankLineups(enemies, "normal", allowDuplicate);
        bestResult.innerHTML = bestBlock("1위 최적 배치", ranked[0], enemies, "normal");
        rankArea.innerHTML = `<h3>추천 30위</h3>${rankList(ranked, "normal")}`;
        return;
      }

      const team1Enemies = getFortressTeam(1);
      const team1Ranked = rankLineups(team1Enemies, "fortress", allowDuplicate);

      if (fortressTeamMode === "one") {
        bestResult.innerHTML = bestBlock("1팀 1위 · 8턴 목표", team1Ranked[0], team1Enemies, "fortress");
        rankArea.innerHTML = `<h3>1팀 추천 30위</h3>${rankList(team1Ranked, "fortress")}`;
      } else {
        const team2Enemies = getFortressTeam(2);
        const team2Ranked = rankLineups(team2Enemies, "fortress", allowDuplicate);
        bestResult.innerHTML = `
          <div class="result-two">
            ${bestBlock("1팀 1위 · 16턴 목표", team1Ranked[0], team1Enemies, "fortress")}
            ${bestBlock("2팀 1위 · 16턴 목표", team2Ranked[0], team2Enemies, "fortress")}
          </div>
        `;
        rankArea.innerHTML =
          `<h3>1팀 추천 30위</h3>${rankList(team1Ranked, "fortress")}` +
          `<h3>2팀 추천 30위</h3>${rankList(team2Ranked, "fortress")}`;
      }
    }

    function renderFortressInputs() {
      const area = document.getElementById("fortressInputs");
      let html = "";
      for (let s = 1; s <= 3; s++) {
        html += `<div class="stage"><h3>스테이지 ${s}</h3><div class="stage-teams">`;
        for (let t = 1; t <= 2; t++) {
          if (t === 2 && fortressTeamMode === "one") continue;
          html += `
            <div class="team-box">
              <h3>상대 ${t}팀</h3>
              <div class="grid3">
                <label>1번 <select id="f_s${s}_t${t}_e1"></select></label>
                <label>2번 <select id="f_s${s}_t${t}_e2"></select></label>
                <label>3번 <select id="f_s${s}_t${t}_e3"></select></label>
              </div>
            </div>
          `;
        }
        html += `</div></div>`;
      }
      area.innerHTML = html;

      let idx = 0;
      for (let s = 1; s <= 3; s++) {
        for (let t = 1; t <= 2; t++) {
          if (t === 2 && fortressTeamMode === "one") continue;
          for (let e = 1; e <= 3; e++) {
            const sel = document.getElementById(`f_s${s}_t${t}_e${e}`);
            populateSelect(sel, idx % TYPES.length);
            sel.addEventListener("change", calculate);
            idx++;
          }
        }
      }
    }

    function renderChart() {
      const area = document.getElementById("chartCards");
      area.innerHTML = TYPES.map(type => {
        const row = ATTACK[type];
        return `
          <details>
            <summary>${type}</summary>
            <div class="pill-row"><span class="great">굉장함</span>${row.great.map(x => `<span class="pill">${x}</span>`).join("") || `<span class="pill">없음</span>`}</div>
            <div class="pill-row"><span class="normal">보통</span>${row.normal.map(x => `<span class="pill">${x}</span>`).join("") || `<span class="pill">없음</span>`}</div>
            <div class="pill-row"><span class="bad">별로</span>${row.bad.map(x => `<span class="pill">${x}</span>`).join("") || `<span class="pill">없음</span>`}</div>
            <div class="pill-row"><span class="verybad">매우 별로</span>${row.verybad.map(x => `<span class="pill">${x}</span>`).join("") || `<span class="pill">없음</span>`}</div>
          </details>
        `;
      }).join("");
    }

    document.querySelectorAll("[data-tab]").forEach(btn => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });

    document.querySelectorAll("[data-mode]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        battleMode = btn.dataset.mode;
        document.getElementById("normalMode").style.display = battleMode === "normal" ? "" : "none";
        document.getElementById("fortressMode").style.display = battleMode === "fortress" ? "" : "none";
        calculate();
      });
    });

    document.addEventListener("click", e => {
      const btn = e.target.closest("[data-team-mode]");
      if (!btn) return;
      document.querySelectorAll("[data-team-mode]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      fortressTeamMode = btn.dataset.teamMode;
  
    function setVersionMode(mode) {
      document.body.classList.toggle("force-pc", mode === "pc");
      document.body.classList.toggle("force-mobile", mode === "mobile");
      document.getElementById("pcVersionBtn").classList.toggle("active", mode === "pc");
      document.getElementById("mobileVersionBtn").classList.toggle("active", mode === "mobile");
      localStorage.setItem("dragonVersionMode", mode);
    }

    document.getElementById("pcVersionBtn").addEventListener("click", () => setVersionMode("pc"));
    document.getElementById("mobileVersionBtn").addEventListener("click", () => setVersionMode("mobile"));

    const savedVersionMode = localStorage.getItem("dragonVersionMode");
    setVersionMode(savedVersionMode === "pc" ? "pc" : "mobile");


    renderFortressInputs();
      calculate();
    });

    populateSelect(document.getElementById("quickAttack"), 0);
    populateSelect(document.getElementById("quickDefense"), 1);
    document.getElementById("quickAttack").addEventListener("change", updateQuick);
    document.getElementById("quickDefense").addEventListener("change", updateQuick);

    ["enemy1","enemy2","enemy3"].forEach((id, i) => {
      populateSelect(document.getElementById(id), i);
      document.getElementById(id).addEventListener("change", calculate);
    });

    document.getElementById("allowDuplicate").addEventListener("change", calculate);


    function setVersionMode(mode) {
      document.body.classList.toggle("force-pc", mode === "pc");
      document.body.classList.toggle("force-mobile", mode === "mobile");
      document.getElementById("pcVersionBtn").classList.toggle("active", mode === "pc");
      document.getElementById("mobileVersionBtn").classList.toggle("active", mode === "mobile");
      localStorage.setItem("dragonVersionMode", mode);
    }

    document.getElementById("pcVersionBtn").addEventListener("click", () => setVersionMode("pc"));
    document.getElementById("mobileVersionBtn").addEventListener("click", () => setVersionMode("mobile"));

    const savedVersionMode = localStorage.getItem("dragonVersionMode");
    setVersionMode(savedVersionMode === "pc" ? "pc" : "mobile");


    renderFortressInputs();
    renderChart();
    updateQuick();
    calculate();
  </script>
</body>
</html>
